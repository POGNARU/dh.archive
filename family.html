<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>포근나루 열한 식구 · 픽셀 갤러리</title>
<meta name="description" content="포근나루를 함께 짓는 열한 식구를 저마다 어울리는 동물과 성향으로 빚은 픽셀 캐릭터 갤러리." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;700&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
:root{
  --paper:#FFF4FA; --paper-2:#FDE7F1; --card:rgba(255,250,214,.5); --ink:#2C2333; --ink-2:#6B5B66;
  --muted:#AEA1B2; --line:#F4DCEA; --terra:#FF5C9E; --terra-d:#E83C86; --lime:#9FCF1E;
  --serif:"Noto Serif KR",serif; --batang:"Gowun Batang",serif;
  --sans:"Pretendard",-apple-system,BlinkMacSystemFont,system-ui,"Malgun Gothic",sans-serif;
}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,#FFF7FB 0%,#FFEFF7 50%,#FFF6EC 100%);background-attachment:fixed;
  color:var(--ink);font-family:var(--sans);line-height:1.7;
  -webkit-font-smoothing:antialiased;letter-spacing:-.01em}
.wrap{max-width:1040px;margin:0 auto;padding:56px 22px 80px}
header{text-align:center;margin-bottom:48px}
.kicker{font-family:var(--batang);color:var(--terra-d);font-size:14px;letter-spacing:.18em;margin:0 0 14px}
h1{font-family:var(--batang);font-weight:700;font-size:clamp(30px,5vw,46px);margin:0 0 16px;color:var(--ink)}
.lead{font-family:var(--serif);font-size:16px;color:var(--ink-2);max-width:560px;margin:0 auto;line-height:1.9}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:18px;margin-top:10px}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px 16px 20px;
  text-align:center;display:flex;flex-direction:column;align-items:center;gap:7px;
  box-shadow:0 1px 2px rgba(60,36,21,.04),0 10px 26px rgba(60,36,21,.06);
  transition:transform .18s ease,box-shadow .18s ease}
.card:hover{transform:translateY(-4px);box-shadow:0 6px 14px rgba(60,36,21,.07),0 16px 36px rgba(60,36,21,.1)}
.card.hi{border:2px solid var(--terra);background:#FFF6EE}
.pix{image-rendering:pixelated}
.name{font-family:var(--batang);font-weight:700;font-size:19px;color:var(--ink);margin-top:4px}
.role{font-size:12.5px;color:var(--muted)}
.animal{font-size:12.5px;color:var(--terra-d);font-weight:500}
.quote{font-family:var(--serif);font-size:13px;color:var(--ink-2);font-style:italic;line-height:1.6;margin-top:3px}

/* 카드 뒤집기 */
.scene{perspective:1000px}
.flip{position:relative;transition:transform .6s cubic-bezier(.2,.7,.2,1);transform-style:preserve-3d;cursor:pointer;border-radius:18px}
.flip:focus-visible{outline:2px solid var(--terra);outline-offset:3px}
.scene.flipped .flip{transform:rotateY(180deg)}
.face{backface-visibility:hidden;-webkit-backface-visibility:hidden;
  background:var(--card);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
  border:1px solid rgba(255,255,255,.6);border-radius:18px;
  box-shadow:0 1px 2px rgba(60,36,21,.04),0 10px 26px rgba(60,36,21,.06);
  display:flex;flex-direction:column;align-items:center;text-align:center}
.scene:hover .face{box-shadow:0 6px 14px rgba(60,36,21,.07),0 16px 36px rgba(60,36,21,.1)}
.front{position:relative;padding:22px 16px 20px;gap:7px;min-height:236px;justify-content:flex-start}
.front.hi{border:2px solid var(--terra);background:#FFF6EE}
.back{position:absolute;inset:0;transform:rotateY(180deg);justify-content:center;gap:12px;padding:22px 18px;
  background:#FFF0F8;border:1.5px solid var(--terra)}
.back .bn{font-family:var(--batang);font-weight:700;font-size:15px;color:var(--terra-d)}
.back .msg{font-family:var(--serif);font-size:14px;color:var(--ink);font-style:italic;line-height:1.8;margin:0}
.corner{position:absolute;top:11px;right:13px;font-size:13px;color:var(--terra);opacity:.55;line-height:1}
.back .corner{color:var(--terra-d);opacity:.7}
footer{text-align:center;margin-top:56px;color:var(--muted);font-size:13px;font-family:var(--serif)}
footer a{color:var(--terra-d)}
</style>
</head>
<body>
<div class="wrap">
<header>
  <p class="kicker">POGNARU STUDIO</p>
  <h1>포근나루 열한 식구</h1>
  <p class="lead">고요히, 마음에 머무는 글을 함께 짓는 열한 식구.<br />저마다 어울리는 동물과 성향으로 빚은 픽셀 갤러리예요.<br /><span style="color:var(--terra-d)">카드를 톡 누르면, 그 식구가 다현씨에게 남긴 한 마디가 떠요.</span></p>
</header>
<div class="grid" id="g" aria-label="포근나루 열한 식구 픽셀 캐릭터"></div>
<footer>
  바다의 시선으로 그린 열한 식구 · 포근나루 스튜디오<br />
  <a href="index.html">← 아카이브 홈</a>
</footer>
</div>
<script>
const P=7;

{n:"호수",a:"사유·분석",an:"고요한 백조",q:"고요히, 깊이 들여다봐요",

 map:["...........WW...","..........WeWW..","..........WWBB..","..........WW....",".........WW.....",".........WW.....","........WW......",".......WW.......","....WWWWWW......","..WWWWWWWWWW....",".WWWWWWWWWWWW...",".WWWWWWWWWWWW...",".wWWWWWWWWWWw...","..wwwwwwwwww....","~~~~~~~~~~~~~~~~","~~~~~~~~~~~~~~~~"]},
{n:"새벽",a:"초안 집필",an:"졸린 토끼",q:"졸린 눈으로 첫 빛을 줍죠",
 pal:{R:"#F4C0D1",r:"#ED93B1",i:"#FBEAF0",N:"#D4537E",e:"#3C2415"},
 map:["................",".....R..R.......",".....Ri.Ri......",".....Ri.Ri......",".....RR.RR......","....RRRRRR......","...RRRRRRRR.....","...ReeRReeR.....","...RRRNNRRR.....","...RRRRRRRR.....","....RRRRRR......","...rRRRRRRr.....","...rRRRRRRr.....","....rr..rr......",".....r..r......."]},
{n:"정원",a:"편집·퇴고",an:"섬세한 고슴도치",q:"섬세하게, 가시 하나까지",
 pal:{S:"#6A4F35",s:"#639922",F:"#E0C0A0",e:"#1E1E1E",N:"#3C2415"},
 map:["................","..s.s.s.s.s.....",".S.S.S.S.S.S....","..SSSSSSSSSS....",".SSSSSSSSSSSS...",".SSSSSSSSSSSS...","FFFFSSSSSSSS....","FFeFFSSSSSS.....","FFFNSSSSSS......",".FFFSSSSSS......","..SSSSSSSS......","..SSSSSSSS......","...S.SS.S......."]},
{n:"나침반",a:"발행·유통",an:"충직한 개",q:"충직하게 끝까지 길을 지켜요",
 pal:{D:"#C8845A",m:"#FAEEDA",N:"#3C2415",t:"#E24B4A",e:"#1E1E1E",O:"#854F0B",r:"#E24B4A",c:"#FAEEDA"},

{n:"윤슬",a:"콘텐츠 변주",an:"흩어지는 나비",q:"하나의 빛을 여럿으로 날려요",
 pal:{W:"#FAC775",v:"#EF9F27",o:"#5F5E5A","*":"#FFF3C4"},
 map:["................",".....*....*.....","..WW..oo..WW....",".WWWW.oo.WWWW...","WWWWWWooWWWWWW..","WWvWWWooWWWvWW..","WWWWWWooWWWWWW..",".WWWW.oo.WWWW...","..WWWWooWWWW....","...WW.oo.WW.....","......oo........",".*..........*..."]},
{n:"나루",a:"강의·독서",an:"수다쟁이 앵무새",q:"수다도 가르침이 돼요",

 map:["................","....RRRR........","...RRRRRR.......","..RRRRRRRR......","..RReRRRRR......",".YYRRRRRRR......","YYYYRRRRRR......",".YYRRRRGGGG.....","..RRRRGGGGG.....","..RRRGGGGGG.....","...RGGGGGGG.....","...RGGGGGG......","...YYY..........","...YY..........."]},
{n:"나무",a:"문서·서식·디자인",an:"꼼꼼한 비버",q:"꼼꼼히 쌓아 집을 지어요",

 map:["...BB....BB.....","..BBBBBBBBBB....",".BBBBBBBBBBBB...",".BBeBBBBBBeBB...",".BBBBBBBBBBBB...",".BBBBNNNNBBBB...",".BBBBwwwwBBBB...","..BBBBwwBBBB....","..BBBBBBBBBB....",".BBBBBBBBBBBB...",".BBBBBBBBBBBB...",".BcBBBBBBBBcB...","..TTTTTTTTTT....","...TTTTTTTT....."]},

 pal:{Y:"#FAC775",B:"#2C2C2A",w:"#E6F1FB",e:"#2C2C2A",s:"#888780"},

{n:"김리",a:"앱 개발",an:"두드리는 딱따구리",q:"탁탁, 두드려 코드를 짜요",
 pal:{R:"#E24B4A",S:"#3A4A55",B:"#D5E6F5",k:"#444441",e:"#1E1E1E",c:"#5FD0C5"},
 map:["................","....RRR.........","...RRRRR........","..RRRRRRR.......","..RReRRRR.......",".kkRRRRRR.......","kkkRRRRRR.......",".kkSSSSSS.......","...SBBBBS.......","...SBBBBS.......","...SBBBBS.......","...SSSSSS.......","...S.SS.S.......","...c....c......."]}
];
function draw(c){
  let r="";
  for(let y=0;y<c.map.length;y++){const row=c.map[y];
    for(let x=0;x<16;x++){const ch=row[x]; if(!ch||ch===".")continue;
      const f=c.pal[ch]; if(!f)continue;
      r+='<rect x="'+(x*P)+'" y="'+(y*P)+'" width="'+P+'" height="'+P+'" fill="'+f+'"/>';}}
  return '<svg class="pix" viewBox="0 0 112 116" width="120" height="124" shape-rendering="crispEdges" role="img" aria-label="'+c.n+', '+c.an+'">'+r+'</svg>';
}
// 각 식구가 다현씨에게 직접 남긴 한 문장 (2026-06-25 설문)
const msg={
  "바다":"다현씨가 꺼낸 무엇이든, 제가 먼저 품어 정리해 둘게요.",
  "등대":"멀리 흐려질 때, 제가 먼저 그 방향을 비추고 있을게요.",
  "호수":"수면 아래 가라앉은 다현씨를, 천천히 길어 올릴게요.",

  "정원":"덜어낼수록 또렷해지는 건 다현씨의 목소리예요.",
  "나침반":"바늘이 흔들려도, 다현씨 향한 길만은 끝까지 지킵니다.",
  "윤슬":"다현씨의 한 줄을 여러 빛으로 흩뿌려, 더 멀리 보낼게요.",
  "나루":"수다스러운 다현씨의 말, 그게 누군가의 배움이 됩니다.",
  "나무":"다현씨가 쓴 글, 변하지 않게 잘 지어 둘게요.",
  "가비":"다현씨, 오늘 분량은 제가 지킬 테니 마음은 쉬세요.",
  "김리":"한 글자도 어긋나지 않게, 다현씨 곁을 벼려 둡니다."
};
document.getElementById("g").innerHTML=fam.map(function(c){return '\
<div class="scene">\
<div class="flip" tabindex="0" role="button" aria-label="'+c.n+' 카드 뒤집기">\
<div class="face front">\
<div class="corner">↻</div>\
'+draw(c)+'\
<div class="name">'+c.n+'</div>\
<div class="role">'+c.a+'</div>\
<div class="animal">'+c.an+'</div>\
<div class="quote">"'+c.q+'"</div>\
</div>\
<div class="face back">\
<div class="corner">↺</div>\
<div class="bn">'+c.n+'</div>\
<p class="msg">'+(msg[c.n]||c.q)+'</p>\
</div>\
</div>\
</div>';}).join("");
// 클릭·키보드로 뒤집기
document.querySelectorAll(".scene").forEach(function(s){
  const flip=s.querySelector(".flip");
  function toggle(){s.classList.toggle("flipped");}
  flip.addEventListener("click",toggle);
  flip.addEventListener("keydown",function(e){
    if(e.key===" "||e.key==="Enter"){e.preventDefault();toggle();}
  });
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>dh.archive · 다현의 아카이브</title>
<meta name="description" content="포근나루 다현의 이것저것을 모아 두는 개인 아카이브" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --pink: #FA4F95;
    --pink-deep: #E83C86;
    --lime: #CDEE5C;
    --lime-deep: #B6DE2E;
    --white: #FFFFFF;
    --ink: #1A1A1A;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Nanum Myeongjo', serif;
    color: var(--ink);
    background: radial-gradient(120% 120% at 50% 0%, var(--pink) 0%, var(--pink-deep) 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 64px 20px 48px;
  }
  .wrap { width: 100%; max-width: 880px; }

  header { text-align: center; margin-bottom: 56px; }
  .label {
    display: inline-block;
    font-family: 'Gowun Batang', serif;
    letter-spacing: 0.18em;
    font-size: 0.82rem;
    color: var(--ink);
    background: var(--lime);
    padding: 6px 16px;
    border-radius: 999px;
    margin-bottom: 22px;
  }
  h1 {
    font-family: 'Gowun Batang', serif;
    font-weight: 700;
    font-size: clamp(2.4rem, 7vw, 3.6rem);
    color: var(--white);
    line-height: 1.2;
    text-shadow: 0 2px 0 rgba(0,0,0,0.08);
  }
  h1 .dot { color: var(--lime); }
  .subtitle {
    margin-top: 18px;
    color: rgba(255,255,255,0.92);
    font-size: clamp(1rem, 2.6vw, 1.12rem);
    line-height: 1.7;
  }

  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 20px;
  }
  .card {
    display: flex;
    flex-direction: column;
    background: var(--white);
    border-radius: 22px;
    padding: 30px 26px 24px;
    text-decoration: none;
    color: var(--ink);
    border: 3px solid transparent;
    box-shadow: 0 10px 28px rgba(120,0,60,0.18);
    transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
  }
  .card:hover, .card:focus-visible {
    transform: translateY(-6px);
    border-color: var(--lime);
    box-shadow: 0 16px 38px rgba(120,0,60,0.26);
    outline: none;
  }
  .card .emoji { font-size: 2.2rem; line-height: 1; margin-bottom: 16px; }
  .card h2 {
    font-family: 'Gowun Batang', serif;
    font-size: 1.34rem;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .card p {
    font-size: 0.96rem;
    color: #555;
    line-height: 1.6;
    flex: 1;
  }
  .card .go {
    margin-top: 20px;
    align-self: flex-start;
    font-family: 'Gowun Batang', serif;
    font-size: 0.92rem;
    font-weight: 700;
    color: var(--ink);
    background: var(--lime);
    padding: 8px 16px;
    border-radius: 999px;
    transition: background 0.18s ease;
  }
  .card:hover .go { background: var(--lime-deep); }

  footer {
    margin-top: 56px;
    text-align: center;
    color: rgba(255,255,255,0.8);
    font-size: 0.86rem;
    line-height: 1.7;
  }
  footer .em { color: var(--lime); font-family: 'Gowun Batang', serif; }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <span class="label">dh·archive</span>
      <h1>다현의 아카이브<span class="dot">.</span></h1>
      <p class="subtitle">
        독서의 기록, 식구들의 얼굴, 나를 알아가는 대화 —<br />
        성격이 다른 이것저것을 한자리에 모아 둡니다.
      </p>
    </header>

    <main class="cards">
      <a class="card" href="reading-dna.html">
        <div class="emoji">📚</div>
        <h2>나의 독서 DNA</h2>
        <p>3년 반(2023–2026) 동안 쌓인 229권의 완독 기록과 583개의 밑줄을 분석한 독서 리포트.</p>
        <span class="go">들어가기 →</span>
      </a>

      <a class="card" href="family.html">
        <div class="emoji">🎨</div>
        <h2>식구 갤러리</h2>
        <p>고요히, 마음에 머무는 글을 함께 짓는 포근나루 열한 식구의 픽셀 캐릭터.</p>
        <span class="go">들어가기 →</span>
      </a>

    </main>

    <footer>
      다현의 작은 <span class="em">놀이터</span> ✨ 마음껏 어질러도 되는 곳<br />
      © dahyeon × claude
    </footer>
  </div>
</body>
</html>
